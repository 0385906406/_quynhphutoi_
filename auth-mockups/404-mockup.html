<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --g1:#1a4d2e; --g2:#2d7a45; --g3:#3fa85e; --g4:#5ec47a; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse at 60% 40%, #d8f0e2 0%, #edf7f1 60%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      width: 900px; height: 500px;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 40px 100px rgba(30,80,50,.15), 0 8px 24px rgba(0,0,0,.06);
      overflow: hidden;
      display: flex;
      animation: cardIn .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(22px) scale(.97); }
      to   { opacity:1; transform:none; }
    }

    /* ── RIGHT: green leaf panel ── */
    .leaf-panel {
      flex: 1; position: relative;
      background: linear-gradient(145deg, #1e5c35 0%, #2d7a45 45%, #3fa85e 100%);
      overflow: hidden;
    }
    .leaf-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(96,204,122,.35) 0%, transparent 65%);
    }
    .leaf-svg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -48%);
      width: 310px; height: auto;
      pointer-events: none;
    }
    .brand-watermark {
      position: absolute; bottom: 22px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      opacity: .3; pointer-events: none;
    }
    .brand-watermark svg  { width:15px; height:15px; fill:white; }
    .brand-watermark span { font-family:'Cormorant Garamond',serif; font-size:.88rem; font-weight:700; color:white; letter-spacing:.04em; }

    /* ── LEFT: content panel ── */
    .content-panel {
      position: relative; z-index: 10;
      width: 510px; height: 100%;
      padding: 52px 52px 52px 56px;
      display: flex; flex-direction: column; justify-content: center;
      background: #fff;
    }

    /* ── BRAND CORNER (desktop: inside content) ── */
    .brand-corner {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 34px; text-decoration: none;
      width: fit-content; transition: opacity .2s;
    }
    .brand-corner:hover { opacity: .75; }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--g2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width:18px; height:18px; fill:white; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--g1); letter-spacing: .02em;
    }

    /* ── LEAF ANIMATION ── */
    #leafGroup {
      transform-origin: 155px 72px;
      transform: rotate(-28deg) translate(-40px, -30px);
      animation: wmWind 8s ease-in-out infinite;
    }
    @keyframes wmWind {
      0%,100% { transform:rotate(-28deg)   translate(-40px,-30px); }
      25%     { transform:rotate(-26.5deg) translate(-37px,-27px) skewX(.4deg); }
      50%     { transform:rotate(-29.5deg) translate(-43px,-33px) skewX(-.4deg); }
      75%     { transform:rotate(-27deg)   translate(-38px,-28px) skewX(.2deg); }
    }
    #leafSheen { animation: sheenMove 5.5s ease-in-out infinite; }
    @keyframes sheenMove {
      0%,100% { opacity:0; transform:translateX(-140px); }
      28%     { opacity:1; transform:translateX(20px); }
      55%     { opacity:.5; transform:translateX(160px); }
      75%     { opacity:0; transform:translateX(280px); }
    }
    .vm { stroke-dasharray:650; stroke-dashoffset:650; animation:dv 2s ease forwards; }
    .vp { stroke-dasharray:220; stroke-dashoffset:220; animation:dv 1.3s ease forwards; }
    @keyframes dv { to { stroke-dashoffset:0; } }
    .d0{animation-delay:.3s}.d1{animation-delay:.5s}.d2{animation-delay:.65s}
    .d3{animation-delay:.75s}.d4{animation-delay:.85s}.d5{animation-delay:.95s}
    .d6{animation-delay:1.05s}.d7{animation-delay:1.12s}

    /* ── TYPOGRAPHY ── */
    .num-404 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 7rem; font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .1s both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:none; }
    }
    .accent-bar {
      width: 44px; height: 3px;
      background: linear-gradient(90deg, var(--g3), transparent);
      border-radius: 2px; margin: 12px 0 16px;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .18s both;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem; font-weight: 700;
      color: var(--g1); line-height: 1.2; margin-bottom: 8px;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .24s both;
    }
    .page-sub {
      font-size: .82rem; color: #7a9e87; font-weight: 300;
      line-height: 1.65; margin-bottom: 28px;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .30s both;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; width: fit-content;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g3) 100%);
      color: #fff; border-radius: 10px; text-decoration: none;
      font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 500;
      box-shadow: 0 6px 22px rgba(30,80,50,.28);
      transition: transform .15s, box-shadow .2s;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .36s both;
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(30,80,50,.36); }
    .btn-home svg { width:15px; height:15px; }
    .extra-links {
      margin-top: 12px; font-size: .78rem; color: #7a9e87;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .42s both;
    }
    .extra-links a { color:var(--g2); font-weight:500; text-decoration:none; transition:color .2s; }
    .extra-links a:hover { color:var(--g1); }

    /* bottom leaf: hidden on desktop */
    .leaf-bottom { display: none; }

    .made-by {
      font-size: .65rem; color: #b0ccb8; text-align: center;
      margin-top: 20px; letter-spacing: .04em;
    }

    /* mobile leaf: hidden on desktop */
    .leaf-mobile { display: none; }
    /* desktop order: content left, leaf right */
    .content-panel { order: 1; }
    .leaf-panel     { order: 2; }

    /* ============================================================
       MOBILE — centered layout (404 bukan form, không cần bottom-sheet)
    ============================================================ */
    @media (max-width: 768px) {
      body { padding: 0; align-items: stretch; }

      .card {
        width: 100%; height: 100dvh; height: 100vh;
        flex-direction: column; border-radius: 0; box-shadow: none;
        background: radial-gradient(ellipse at 40% 35%, #b8dfc8 0%, #d4eedd 55%, #e8f5ee 100%);
        align-items: center; justify-content: center;
        overflow: hidden;
      }

      .leaf-panel { display: none; }

      /* Leaf trang trí — mờ, góc trên phải */
      .leaf-mobile {
        display: block;
        position: absolute;
        top: -30px; right: -70px;
        width: 55vw; height: auto;
        opacity: .28;
        pointer-events: none; z-index: 1;
      }

      /* Brand corner: top-left */
      .brand-corner {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 20px);
        left: 22px; z-index: 10;
        margin-bottom: 0;
      }
      .brand-name { color: var(--g1); }

      /* Content: centered, transparent background */
      .content-panel {
        position: relative; z-index: 5;
        width: 100%; flex: none;
        padding: 0 32px;
        background: transparent;
        border-radius: 0; box-shadow: none;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center;
      }

      .num-404 { font-size: 6rem; }
      .page-title { font-size: 1.55rem; }
      .page-sub { color: #3a6e4e; }
      .accent-bar { margin: 12px auto 16px; }

      .btn-home {
        background: linear-gradient(135deg, var(--g1) 0%, var(--g3) 100%);
        box-shadow: 0 6px 22px rgba(30,80,50,.3);
      }
      .extra-links { color: #4a7a5e; }
      .extra-links a { color: var(--g1); }

      .leaf-bottom { display: none; }
    }

    @media (max-width: 400px) {
      .content-panel { padding: 0 24px; }
      .num-404 { font-size: 5rem; }
      .page-title { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Leaf mobile (top-right, only on mobile) -->
  <svg class="leaf-mobile" viewBox="-5 8 430 740" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lbgm" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#12381f"/>
        <stop offset="40%"  stop-color="#2d7a45"/>
        <stop offset="100%" stop-color="#60cc7c"/>
      </linearGradient>
      <clipPath id="lclipm">
        <path d="M210 8 C295 55,415 185,420 330 C425 470,355 625,272 705 C248 728,228 742,210 746 C192 742,172 728,148 705 C65 625,-5 470,0 330 C5 185,125 55,210 8 Z"/>
      </clipPath>
    </defs>
    <g style="transform-origin:155px 72px;transform:rotate(-32deg) translate(-55px,-38px)">
      <g clip-path="url(#lclipm)">
        <rect x="-25" y="0" width="480" height="760" fill="url(#lbgm)"/>
        <g fill="none" stroke-linecap="round">
          <path d="M210 16 C210 520,210 520,210 742" stroke="rgba(255,255,255,.4)" stroke-width="2.5"/>
          <path d="M210 188 C168 212,122 234,46 265"  stroke="rgba(255,255,255,.25)" stroke-width="1.4"/>
          <path d="M210 262 C166 288,118 310,38 345"  stroke="rgba(255,255,255,.22)" stroke-width="1.3"/>
          <path d="M210 188 C252 212,298 234,374 265" stroke="rgba(255,255,255,.25)" stroke-width="1.4"/>
          <path d="M210 262 C254 288,302 310,382 345" stroke="rgba(255,255,255,.22)" stroke-width="1.3"/>
        </g>
        <path d="M210 8 C295 55,415 185,420 330 C425 470,355 625,272 705 C248 728,228 742,210 746 C192 742,172 728,148 705 C65 625,-5 470,0 330 C5 185,125 55,210 8 Z"
              fill="none" stroke="rgba(255,255,255,.1)" stroke-width="10"/>
      </g>
    </g>
  </svg>

  <!-- Green leaf panel (desktop only) -->
  <div class="leaf-panel">
    <svg class="leaf-svg" viewBox="-5 8 430 740" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <linearGradient id="lbg" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#12381f"/>
          <stop offset="35%"  stop-color="#2d7a45"/>
          <stop offset="70%"  stop-color="#3fa85e"/>
          <stop offset="100%" stop-color="#60cc7c"/>
        </linearGradient>
        <linearGradient id="lhl" x1="0%" y1="0%" x2="80%" y2="100%">
          <stop offset="0%"   stop-color="#80e89c" stop-opacity=".22"/>
          <stop offset="100%" stop-color="#1a4d2e"  stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="white" stop-opacity="0"/>
          <stop offset="42%"  stop-color="white" stop-opacity=".18"/>
          <stop offset="58%"  stop-color="white" stop-opacity=".22"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        <filter id="ls">
          <feDropShadow dx="6" dy="12" stdDeviation="18" flood-color="#0f3020" flood-opacity=".2"/>
        </filter>
        <clipPath id="lclip">
          <path d="M210 8 C295 55,415 185,420 330 C425 470,355 625,272 705 C248 728,228 742,210 746 C192 742,172 728,148 705 C65 625,-5 470,0 330 C5 185,125 55,210 8 Z"/>
        </clipPath>
      </defs>
      <g id="leafGroup" filter="url(#ls)">
        <g clip-path="url(#lclip)">
          <rect x="-25" y="0" width="480" height="760" fill="url(#lbg)"/>
          <rect x="-25" y="0" width="480" height="760" fill="url(#lhl)"/>
          <g fill="none" stroke-linecap="round">
            <path class="vm d0" d="M210 16 C210 220,210 520,210 742" stroke="rgba(255,255,255,.48)" stroke-width="2.8"/>
            <path class="vp d1" d="M210 118 C174 138,132 157,62 182"  stroke="rgba(255,255,255,.30)" stroke-width="1.7"/>
            <path class="vp d2" d="M210 188 C168 212,122 234,46 265"  stroke="rgba(255,255,255,.28)" stroke-width="1.6"/>
            <path class="vp d3" d="M210 262 C166 288,118 310,38 345"  stroke="rgba(255,255,255,.26)" stroke-width="1.5"/>
            <path class="vp d4" d="M210 336 C168 362,126 380,50 412"  stroke="rgba(255,255,255,.24)" stroke-width="1.4"/>
            <path class="vp d5" d="M210 405 C176 426,142 443,82 468"  stroke="rgba(255,255,255,.22)" stroke-width="1.3"/>
            <path class="vp d6" d="M210 468 C186 482,160 496,116 514" stroke="rgba(255,255,255,.19)" stroke-width="1.1"/>
            <path class="vp d7" d="M210 524 C194 534,174 544,144 555" stroke="rgba(255,255,255,.15)" stroke-width=".9"/>
            <path class="vp d1" d="M210 118 C246 138,288 157,358 182" stroke="rgba(255,255,255,.30)" stroke-width="1.7"/>
            <path class="vp d2" d="M210 188 C252 212,298 234,374 265" stroke="rgba(255,255,255,.28)" stroke-width="1.6"/>
            <path class="vp d3" d="M210 262 C254 288,302 310,382 345" stroke="rgba(255,255,255,.26)" stroke-width="1.5"/>
            <path class="vp d4" d="M210 336 C252 362,294 380,370 412" stroke="rgba(255,255,255,.24)" stroke-width="1.4"/>
            <path class="vp d5" d="M210 405 C244 426,278 443,338 468" stroke="rgba(255,255,255,.22)" stroke-width="1.3"/>
          </g>
          <rect id="leafSheen" x="-80" y="0" width="300" height="760" fill="url(#sheen)"/>
          <path d="M210 8 C295 55,415 185,420 330 C425 470,355 625,272 705 C248 728,228 742,210 746 C192 742,172 728,148 705 C65 625,-5 470,0 330 C5 185,125 55,210 8 Z"
                fill="none" stroke="rgba(255,255,255,.1)" stroke-width="10"/>
        </g>
        <path d="M210 744 C206 768,204 790,210 806" stroke="#12381f" stroke-width="4.5" fill="none" stroke-linecap="round" opacity=".55"/>
      </g>
    </svg>
    <div class="brand-watermark">
      <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.5c1.64-1.18 3.41-1.8 4.93-1.5C10 18.33 10.83 21 12 21c3.31 0 6-5.37 6-9 0-1.98-.67-3.5-1-4z"/></svg>
      <span>My Quynh Phu</span>
    </div>
  </div>

  <!-- Content panel -->
  <div class="content-panel">

    <a class="brand-corner" href="login-mockup.html">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.5c1.64-1.18 3.41-1.8 4.93-1.5C10 18.33 10.83 21 12 21c3.31 0 6-5.37 6-9 0-1.98-.67-3.5-1-4z"/></svg>
      </div>
      <span class="brand-name">My Quynh Phu</span>
    </a>

    <div class="num-404">404</div>
    <div class="accent-bar"></div>
    <div class="page-title">Page not found</div>
    <div class="page-sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</div>

    <a href="login-mockup.html" class="btn-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Home
    </a>

    <div class="extra-links">
      Go to <a href="login-mockup.html">Sign in</a> &nbsp;·&nbsp; <a href="register-mockup.html">Sign up</a>
    </div>

    <p class="made-by">Made by NguyenVietDuong</p>

    <!-- Bottom decorative leaf (mobile only) -->
    <svg class="leaf-bottom" viewBox="-5 8 430 740" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lbgb" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#60cc7c"/>
          <stop offset="50%"  stop-color="#2d7a45"/>
          <stop offset="100%" stop-color="#12381f"/>
        </linearGradient>
      </defs>
      <g opacity="0.11">
        <path d="M210 8 C295 55,415 185,420 330 C425 470,355 625,272 705 C248 728,228 742,210 746 C192 742,172 728,148 705 C65 625,-5 470,0 330 C5 185,125 55,210 8 Z" fill="url(#lbgb)"/>
        <path d="M210 16 C210 220,210 520,210 742" stroke="rgba(255,255,255,.5)" stroke-width="2.5" fill="none"/>
        <path d="M210 262 C166 288,118 310,38 345"  stroke="rgba(255,255,255,.25)" stroke-width="1.2" fill="none"/>
        <path d="M210 262 C254 288,302 310,382 345" stroke="rgba(255,255,255,.25)" stroke-width="1.2" fill="none"/>
      </g>
    </svg>

  </div>

</div>
</body>
</html>
