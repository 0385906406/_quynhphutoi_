<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Code — Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       OTP Verify — Standalone Mockup (English)
       Layout: Form LEFT · Leaf RIGHT (mirrored, same as register)
    ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g1: #1a4d2e; --g2: #2d7a45; --g3: #3fa85e; --g4: #5ec47a;
      --wm-white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse at 70% 50%, #d8f0e2 0%, #edf7f1 60%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* CARD */
    .card {
      position: relative;
      width: 940px; min-height: 510px;
      background: var(--wm-white);
      border-radius: 30px;
      box-shadow: 0 40px 100px rgba(30,80,50,.15), 0 8px 24px rgba(0,0,0,.06);
      overflow: hidden;
      display: flex;
      animation: cardIn .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(22px) scale(.97); }
      to   { opacity:1; transform:none; }
    }

    /* LEAF LAYER — mirrored RIGHT */
    .leaf-layer {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 2; overflow: visible;
      transform: scaleX(-1);
    }
    #leafGroup {
      transform-origin: 155px 72px;
      transform: rotate(-32deg) translate(-55px, -38px);
      animation: wmWind 8s ease-in-out infinite;
    }
    @keyframes wmWind {
      0%,100% { transform: rotate(-32deg)   translate(-55px,-38px); }
      20%     { transform: rotate(-30.4deg) translate(-52px,-35px) skewX(.5deg); }
      45%     { transform: rotate(-33.4deg) translate(-57px,-41px) skewX(-.45deg); }
      62%     { transform: rotate(-31deg)   translate(-53px,-36px) skewX(.3deg); }
      80%     { transform: rotate(-32.8deg) translate(-56px,-40px) skewX(-.2deg); }
    }
    #leafSheen { animation: sheenMove 5.5s ease-in-out infinite; }
    @keyframes sheenMove {
      0%,100% { opacity:0; transform:translateX(-140px); }
      28%     { opacity:1; transform:translateX(20px); }
      55%     { opacity:.5; transform:translateX(160px); }
      75%     { opacity:0; transform:translateX(280px); }
    }
    .vm { stroke-dasharray:650; stroke-dashoffset:650; animation:dv 2s ease forwards; }
    .vp { stroke-dasharray:220; stroke-dashoffset:220; animation:dv 1.3s ease forwards; }
    .vs { stroke-dasharray:130; stroke-dashoffset:130; animation:dv 1s ease forwards; }
    .vt { stroke-dasharray:80;  stroke-dashoffset:80;  animation:dv .8s ease forwards; }
    @keyframes dv { to { stroke-dashoffset:0; } }
    .d0{animation-delay:.3s}.d1{animation-delay:.5s}.d2{animation-delay:.65s}
    .d3{animation-delay:.75s}.d4{animation-delay:.85s}.d5{animation-delay:.95s}
    .d6{animation-delay:1.05s}.d7{animation-delay:1.12s}.d8{animation-delay:1.18s}
    .d9{animation-delay:1.24s}.d10{animation-delay:1.30s}.d11{animation-delay:1.36s}
    .d12{animation-delay:1.42s}.d13{animation-delay:1.48s}.d14{animation-delay:1.54s}

    @media (prefers-reduced-motion: reduce) {
      .card, #leafGroup, #leafSheen { animation: none; }
      #leafGroup { transform: rotate(-32deg) translate(-55px,-38px); }
    }

    /* FORM PANEL — LEFT */
    .form-panel {
      position: relative; z-index: 10;
      width: 400px; min-height: 510px;
      padding: 70px 36px 50px 48px;
      display: flex; flex-direction: column; justify-content: center;
    }

    /* BRAND CORNER — top-right, trên vùng xanh */
    .brand-corner {
      position: absolute; top: 28px; right: 38px;
      display: flex; align-items: center; gap: 8px; z-index: 20;
      cursor: pointer; transition: opacity .2s; text-decoration: none;
    }
    .brand-corner:hover { opacity: .8; }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,.22);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 18px; height: 18px; fill: white; }
    .brand-corner-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 700;
      color: rgba(255,255,255,.92); letter-spacing: .02em;
    }

    /* TITLE ROW */
    .title-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .title-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #e8f7ee, #d0f0de);
      display: flex; align-items: center; justify-content: center;
    }
    .title-icon svg { width: 18px; height: 18px; color: var(--g2); }
    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.95rem; font-weight: 700;
      color: var(--g1); line-height: 1.1;
    }
    .form-sub {
      font-size: .8rem; color: #7a9e87;
      margin-bottom: 6px; font-weight: 300; line-height: 1.5;
    }

    /* Email hint */
    .email-hint {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(63,168,94,.08); border-radius: 8px;
      padding: 6px 10px; margin-bottom: 22px;
      font-size: .78rem; color: var(--g2); font-weight: 500;
    }
    .email-hint svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* OTP BOXES */
    .otp-group {
      display: flex; gap: 8px;
      margin-bottom: 20px;
    }
    .otp-box {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border: 1.5px solid #d8eede;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.3rem; font-weight: 600;
      color: var(--g1);
      text-align: center;
      background: rgba(240,250,244,.7);
      outline: none;
      caret-color: transparent;
      transition: border-color .18s, box-shadow .18s, background .18s, transform .12s;
      -webkit-appearance: none; appearance: none;
    }
    .otp-box:focus {
      border-color: var(--g3);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(63,168,94,.15);
      transform: translateY(-2px);
    }
    .otp-box.filled {
      border-color: var(--g3);
      background: #f2fbf5;
      color: var(--g1);
    }
    /* hide spinner on number input */
    .otp-box::-webkit-outer-spin-button,
    .otp-box::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* Submit */
    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g3) 100%);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 500;
      letter-spacing: .05em; cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 6px 22px rgba(30,80,50,.28);
      transition: transform .15s, box-shadow .2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(30,80,50,.36); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { cursor: progress; opacity: .75; transform: none; }
    .btn-login::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%); pointer-events:none; }

    /* Resend row */
    .resend-row {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      margin-top: 14px; font-size: .78rem; color: #7a9e87;
    }
    .resend-btn {
      background: none; border: none; padding: 0;
      font-family: 'DM Sans', sans-serif; font-size: .78rem;
      font-weight: 500; color: var(--g3); cursor: pointer;
      transition: color .2s;
    }
    .resend-btn:hover:not(:disabled) { color: var(--g1); }
    .resend-btn:disabled { color: #a8c4b0; cursor: default; }
    .timer { font-size: .78rem; color: #a8c4b0; min-width: 24px; }

    .back-row {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      margin-top: 8px; font-size: .78rem; color: #7a9e87;
    }
    .back-row a {
      color: var(--g2); font-weight: 500; text-decoration: none; transition: color .2s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .back-row a:hover { color: var(--g1); }
    .back-row svg { width: 12px; height: 12px; }

    /* ========== SUCCESS STATE ========== */
    .success-panel {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 0 8px;
    }
    .success-panel.active { display: flex; }
    .success-icon {
      width: 64px; height: 64px; border-radius: 20px;
      background: linear-gradient(135deg, #e8f7ee, #c8eedd);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.6); }
      to   { opacity:1; transform:scale(1); }
    }
    .success-icon svg { width: 32px; height: 32px; color: var(--g2); }
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem; font-weight: 700;
      color: var(--g1); margin-bottom: 8px;
    }
    .success-sub {
      font-size: .82rem; color: #7a9e87; line-height: 1.6;
      margin-bottom: 22px; font-weight: 300;
    }
    .btn-continue {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 28px;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g3) 100%);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 6px 20px rgba(30,80,50,.25);
      transition: transform .15s, box-shadow .2s;
    }
    .btn-continue:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(30,80,50,.34); }

    /* Bottom leaf: hidden on desktop */
    .leaf-bottom { display: none; }

    .field-error { font-size:.7rem; color:#d95454; margin-top:8px; display:none; text-align:center; }
    .field-error.show { display:block; animation:errIn .18s ease; }
    @keyframes errIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
    .otp-box.err { border-color:#d95454 !important; box-shadow:0 0 0 3px rgba(217,84,84,.12) !important; }

    .made-by {
      font-size: .65rem; color: #b0ccb8; letter-spacing: .04em;
      position: absolute; bottom: 20px; left: 0; right: 0; text-align: center;
    }

    /* ============================================================
       MOBILE
    ============================================================ */
    @media (max-width: 768px) {
      body { padding: 0; align-items: stretch; }

      .card {
        width: 100%; max-width: 100%;
        height: 100dvh; height: 100vh;
        flex-direction: column; border-radius: 0; box-shadow: none;
        background: radial-gradient(ellipse at 70% 40%, #a8d8bc 0%, #ceeedd 100%);
        overflow: hidden;
      }

      .leaf-layer {
        position: absolute;
        top: -20px; right: -60px; bottom: auto; left: auto;
        width: 62vw; height: auto;
        opacity: 0.45; z-index: 2;
        transform: none;
      }

      .brand-corner {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 20px);
        left: 22px; right: auto; z-index: 10;
      }
      .brand-corner-name { color: var(--g1); }
      .brand-icon { background: var(--g2); }

      .form-panel {
        margin-top: 190px; flex: 1;
        width: 100%; margin-left: 0;
        padding: 30px 26px calc(32px + env(safe-area-inset-bottom, 0px));
        background: #fff;
        border-radius: 24px 24px 0 0;
        box-shadow: 0 -6px 24px rgba(0,0,0,.1);
        justify-content: flex-start;
        overflow-y: auto; z-index: 20;
        animation: panelUp .5s cubic-bezier(.22,1,.36,1) both;
      }
      @keyframes panelUp {
        from { transform: translateY(24px); opacity: 0; }
        to   { transform: none; opacity: 1; }
      }

      .form-title { font-size: 1.75rem; }
      .otp-group { align-items: flex-start; }
      .otp-box { flex: 1; min-width: 0; width: auto; height: auto; aspect-ratio: 1/1; font-size: 1.1rem; border-radius: 10px; }

      .leaf-bottom {
        display: block; position: absolute;
        bottom: -120px; right: -65px;
        width: 60vw; height: auto;
        transform: rotate(148deg) scaleX(-1);
        pointer-events: none; z-index: 22;
      }
    }

    @media (max-width: 400px) {
      .form-panel { margin-top: 160px; padding: 26px 20px calc(28px + env(safe-area-inset-bottom, 0px)); }
      .otp-group { gap: 6px; }
      .otp-box { font-size: 0.95rem; border-radius: 8px; }
    }
  </style>
</head>

    <a class="brand-corner" href="login-mockup.html" aria-label="My Quynh Phu">

    <!-- ========== FORM — LEFT ========== -->
    <form class="form-panel" id="otpForm" onsubmit="handleSubmit(event)" novalidate>

      <!-- DEFAULT STATE -->
      <div class="form-main">

        <div class="title-row">
          <div class="title-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="form-title">Check your email</div>
        </div>

        <div class="form-sub">We sent a 6-digit verification code to</div>
        <div class="email-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          j***@example.com
        </div>

        <!-- 6 OTP boxes -->
        <div class="otp-group" id="otpGroup">
          <input class="otp-box" type="text" inputmode="numeric" pattern="\d*" tabindex="1" />
          <input class="otp-box" type="text" inputmode="numeric" pattern="\d*" tabindex="2" />
          <input class="otp-box" type="text" inputmode="numeric" pattern="\d*" tabindex="3" />
          <input class="otp-box" type="text" inputmode="numeric" pattern="\d*" tabindex="4" />
          <input class="otp-box" type="text" inputmode="numeric" pattern="\d*" tabindex="5" />
          <input class="otp-box" type="text" inputmode="numeric" pattern="\d*" tabindex="6" />
        </div>
        <p class="field-error" id="otpError" style="margin-bottom:14px;">Incorrect code. Please try again.</p>

        <button class="btn-login" type="submit" id="submitBtn" disabled>Verify Code</button>

        <div class="resend-row">
          Didn't receive it?
          <button type="button" class="resend-btn" id="resendBtn" onclick="resendCode()" disabled>Resend code</button>
          <span class="timer" id="timer">60s</span>
        </div>

        <div class="back-row">
          <a href="forgot-mockup.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Back
          </a>
        </div>

      </div>

      <!-- SUCCESS STATE -->
      <div class="success-panel" id="successPanel">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div class="success-title">Code verified!</div>
        <div class="success-sub">Your identity has been confirmed.<br/>You can now reset your password.</div>
        <a href="reset-mockup.html" class="btn-continue">
          Continue
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>

      <p class="made-by">Made by NguyenVietDuong</p>
    </form>

    <!-- BOTTOM LEAF (mobile only) -->
    <svg class="leaf-bottom" viewBox="-5 8 430 740" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lbg2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#60cc7c"/>
          <stop offset="50%" stop-color="#2d7a45"/>
          <stop offset="100%" stop-color="#12381f"/>
        </linearGradient>
      </defs>
      <g opacity="0.11">
        <path d="M210 8 C295 55,415 185,420 330 C425 470,355 625,272 705 C248 728,228 742,210 746 C192 742,172 728,148 705 C65 625,-5 470,0 330 C5 185,125 55,210 8 Z" fill="url(#lbg2)"/>
        <g fill="none" stroke-linecap="round">
          <path d="M210 16 C210 220,210 520,210 742" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>
          <path d="M210 118 C174 138,132 157,62 182"  stroke="rgba(255,255,255,.35)" stroke-width="1.4"/>
          <path d="M210 118 C246 138,288 157,358 182" stroke="rgba(255,255,255,.35)" stroke-width="1.4"/>
          <path d="M210 262 C166 288,118 310,38 345"  stroke="rgba(255,255,255,.28)" stroke-width="1.2"/>
          <path d="M210 262 C254 288,302 310,382 345" stroke="rgba(255,255,255,.28)" stroke-width="1.2"/>
        </g>
      </g>
    </svg>

  </div><!-- .card -->

  <script>
    const boxes     = Array.from(document.querySelectorAll('.otp-box'));
    const submitBtn = document.getElementById('submitBtn');

    /* ── OTP input logic ── */
    function lockAll()   { boxes.forEach(b => b.readOnly = true); }
    function unlockAll() { boxes.forEach(b => b.readOnly = false); }

    boxes.forEach((box, i) => {
      // Focus box 0 khi đã đủ 6 số → xóa hết + mở khóa để nhập lại
      box.addEventListener('focus', () => {
        if (i === 0 && boxes.every(b => b.value !== '')) {
          boxes.forEach(b => b.value = '');
          unlockAll();
          syncFilled(); checkComplete();
        }
        box.select();
      });

      // Input event: chạy sau browser insert → sanitize + advance (focus() ở đây luôn ổn định)
      box.addEventListener('input', () => {
        const v = box.value.replace(/\D/g, '');
        box.value = v ? v[v.length - 1] : '';
        syncFilled(); checkComplete();
        if (box.value && i < 5) boxes[i + 1].focus();
        clearOtpError();
      });

      box.addEventListener('keydown', e => {
        const isDigit = /^\d$/.test(e.key) && !e.ctrlKey && !e.metaKey;
        const nav = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Enter'];
        if (!isDigit && !nav.includes(e.key) && !e.ctrlKey && !e.metaKey) {
          e.preventDefault(); return;
        }
        if (e.key === 'Backspace') {
          e.preventDefault();
          unlockAll();
          box.value = '';
          syncFilled(); checkComplete();
          if (i > 0) boxes[i - 1].focus();
          return;
        }
        if (e.key === 'ArrowLeft'  && i > 0) { e.preventDefault(); boxes[i - 1].focus(); }
        if (e.key === 'ArrowRight' && i < 5) { e.preventDefault(); boxes[i + 1].focus(); }
      });

      box.addEventListener('paste', e => {
        e.preventDefault();
        unlockAll();
        const digits = (e.clipboardData.getData('text') || '').replace(/\D/g, '');
        digits.split('').slice(0, 6).forEach((ch, j) => { if (boxes[j]) boxes[j].value = ch; });
        boxes[Math.min(digits.length, 5)].focus();
        syncFilled(); checkComplete();
      });
    });

    function syncFilled() {
      boxes.forEach(b => b.classList.toggle('filled', b.value !== ''));
    }

    function checkComplete() {
      const done = boxes.every(b => b.value !== '');
      submitBtn.disabled = !done;
      if (done) lockAll();
    }

    /* ── Countdown ── */
    let countdown = 60;
    const timerEl  = document.getElementById('timer');
    const resendEl = document.getElementById('resendBtn');

    function startTimer() {
      resendEl.disabled = true;
      timerEl.textContent = countdown + 's';
      const iv = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          timerEl.textContent = countdown + 's';
        } else {
          clearInterval(iv);
          timerEl.textContent = '';
          resendEl.disabled = false;
        }
      }, 1000);
    }
    startTimer();

    function resendCode() {
      boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
      boxes[0].focus();
      submitBtn.disabled = true;
      countdown = 60;
      startTimer();
    }

    /* ── Submit ── */
    function handleSubmit(e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying…';

      /* Simulate shake on wrong code (demo: treat "000000" as wrong) */
      const code = boxes.map(b => b.value).join('');
      setTimeout(() => {
        if (code === '000000') {
          shakeBoxes();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Verify Code';
        } else {
          document.querySelector('.form-main').style.display = 'none';
          document.getElementById('successPanel').classList.add('active');
        }
      }, 900);
    }

    function clearOtpError() {
      boxes.forEach(b => b.classList.remove('err'));
      document.getElementById('otpError').classList.remove('show');
    }

    function shakeBoxes() {
      const group = document.getElementById('otpGroup');
      boxes.forEach(b => b.classList.add('err'));
      document.getElementById('otpError').classList.add('show');
      group.style.animation = 'none';
      group.offsetHeight;
      group.style.animation = 'shake .4s ease';
      setTimeout(() => {
        group.style.animation = '';
        unlockAll();
        boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
        submitBtn.disabled = true;
        boxes[0].focus();
      }, 400);
    }
  </script>

  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
  </style>
</body>
</html>
