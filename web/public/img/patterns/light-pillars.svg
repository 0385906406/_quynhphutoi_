<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
<title>SATI Pattern 03 - Light Pillars</title>
<defs>
<radialGradient id="cornerGlow" cx="0.85" cy="1" r="0.7">
<stop offset="0%" stop-color="#34D4B8" stop-opacity="0.25"/>
<stop offset="60%" stop-color="#6366F1" stop-opacity="0.10"/>
<stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
</radialGradient>
<linearGradient id="pillT" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34D4B8" stop-opacity="0.7"/><stop offset="60%" stop-color="#00A98F" stop-opacity="0.45"/><stop offset="100%" stop-color="#00A98F" stop-opacity="0"/></linearGradient>
<linearGradient id="pillI" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818CF8" stop-opacity="0.7"/><stop offset="60%" stop-color="#6366F1" stop-opacity="0.45"/><stop offset="100%" stop-color="#6366F1" stop-opacity="0"/></linearGradient>
<radialGradient id="topT"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="25%" stop-color="#34D4B8" stop-opacity="0.6"/><stop offset="100%" stop-color="#34D4B8" stop-opacity="0"/></radialGradient>
<radialGradient id="topI"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="25%" stop-color="#818CF8" stop-opacity="0.6"/><stop offset="100%" stop-color="#6366F1" stop-opacity="0"/></radialGradient>
<pattern id="hexP" x="0" y="0" width="18" height="16" patternUnits="userSpaceOnUse">
<path d="M 9 1 L 17 5 L 17 12 L 9 16 L 1 12 L 1 5 Z" fill="none" stroke="#0F4C81" stroke-width="0.35" stroke-opacity="0.18"/>
</pattern>
<clipPath id="ground"><path d="M 0,140 Q 600,90 1200,140 L 1200,220 L 0,220 Z"/></clipPath>
</defs>
<rect width="1200" height="220" fill="#F5FAFE"/>
<rect width="1200" height="220" fill="url(#cornerGlow)"/>
<g clip-path="url(#ground)"><rect x="0" y="90" width="1200" height="130" fill="url(#hexP)"/></g>
<g opacity="0.6">
<rect x="680" y="95" width="0.8" height="55" fill="url(#pillT)"/><circle cx="680.4" cy="95" r="3.5" fill="url(#topT)"/>
<rect x="720" y="88" width="0.8" height="62" fill="url(#pillI)"/><circle cx="720.4" cy="88" r="4" fill="url(#topI)"/>
<rect x="760" y="100" width="0.8" height="50" fill="url(#pillT)"/><circle cx="760.4" cy="100" r="3.5" fill="url(#topT)"/>
<rect x="800" y="93" width="0.8" height="57" fill="url(#pillI)"/><circle cx="800.4" cy="93" r="3.8" fill="url(#topI)"/>
</g>
<g opacity="0.85">
<rect x="850" y="65" width="1.4" height="95" fill="url(#pillT)"/><circle cx="850.7" cy="65" r="7" fill="url(#topT)"/><circle cx="850.7" cy="65" r="2" fill="#FFFFFF" opacity="0.9"/>
<rect x="910" y="58" width="1.5" height="100" fill="url(#pillI)"/><circle cx="910.75" cy="58" r="7.5" fill="url(#topI)"/><circle cx="910.75" cy="58" r="2.2" fill="#FFFFFF" opacity="0.9"/>
<rect x="975" y="70" width="1.4" height="90" fill="url(#pillT)"/><circle cx="975.7" cy="70" r="7" fill="url(#topT)"/><circle cx="975.7" cy="70" r="2" fill="#FFFFFF" opacity="0.9"/>
<rect x="1040" y="55" width="1.5" height="102" fill="url(#pillI)"/><circle cx="1040.75" cy="55" r="8" fill="url(#topI)"/><circle cx="1040.75" cy="55" r="2.3" fill="#FFFFFF" opacity="0.9"/>
<rect x="1110" y="75" width="1.4" height="85" fill="url(#pillT)"/><circle cx="1110.7" cy="75" r="7" fill="url(#topT)"/><circle cx="1110.7" cy="75" r="2" fill="#FFFFFF" opacity="0.9"/>
